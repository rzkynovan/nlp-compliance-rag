# docker-compose.local.yml
# Development lokal — localhost URLs, semua service aktif termasuk monitoring
#
# Usage:
#   cd docker
#   docker-compose -f docker-compose.local.yml up -d

services:
  backend:
    build:
      context: ..
      dockerfile: docker/backend.Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - LLAMAPARSE_API_KEY=${LLAMAPARSE_API_KEY:-}
      - DATABASE_URL=postgresql://compliance:compliance123@db:5432/compliance_db
      - REDIS_URL=redis://redis:6379/0
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - CHROMADB_PERSIST_DIR=/app/data/processed/chroma_db
      - ALLOWED_ORIGINS=http://localhost:3000
    volumes:
      - ../data:/app/data
    depends_on:
      - db
      - redis
      - mlflow
    networks:
      - compliance-network

  frontend:
    build:
      context: ..
      dockerfile: docker/frontend.Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - compliance-network

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=compliance
      - POSTGRES_PASSWORD=compliance123
      - POSTGRES_DB=compliance_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - compliance-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - compliance-network

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.9.0
    ports:
      - "5001:5000"
    command: mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri sqlite:///mlflow.db --default-artifact-root /mlflow/artifacts
    environment:
      - MLFLOW_BACKEND_STORE_URI=sqlite:///mlflow.db
      - MLFLOW_ARTIFACT_ROOT=/mlflow/artifacts
    volumes:
      - mlflow_artifacts:/mlflow/artifacts
    networks:
      - compliance-network

  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    networks:
      - compliance-network

  celery_worker:
    build:
      context: ..
      dockerfile: docker/backend.Dockerfile
    command: celery -A app.workers.tasks worker --loglevel=info
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
      - backend
    networks:
      - compliance-network

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks:
      - compliance-network

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    networks:
      - compliance-network

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - frontend
      - backend
    networks:
      - compliance-network

volumes:
  postgres_data:
  redis_data:
  mlflow_artifacts:
  chroma_data:
  prometheus_data:
  grafana_data:

networks:
  compliance-network:
    driver: bridge
