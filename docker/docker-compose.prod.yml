# docker-compose.prod.yml
# Production deployment untuk server 2CPU 2GB RAM
# Lightweight setup: SQLite, no Redis, no MLflow, no monitoring

services:
  backend:
    build:
      context: ..
      dockerfile: docker/backend.Dockerfile
    container_name: compliance-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # SQLite instead of PostgreSQL (hemat RAM)
      - DATABASE_URL=sqlite:///app/data/compliance.db
      
      # No Redis - use in-memory cache
      - REDIS_URL=  # Kosong = disable Redis
      
      # No MLflow di production (hemat RAM)
      - MLFLOW_TRACKING_URI=  # Kosong = disable MLflow
      
      # ChromaDB path
      - CHROMADB_PERSIST_DIR=/app/data/processed/chroma_db
      
      # CORS
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000,http://your-domain:3000}
      
      # Cost optimization
      - DAILY_BUDGET_LIMIT_USD=${DAILY_BUDGET_LIMIT_USD:-5.0}
      - CACHE_TTL_HOURS=24
      
    volumes:
      # Data sudah ditransfer via SCP, mount sebagai read-only untuk safety
      - ../data:/app/data:rw
      
    # Resource limits untuk 2CPU 2GB
    deploy:
      resources:
        limits:
          cpus: '0.8'
          memory: 768M
        reservations:
          cpus: '0.5'
          memory: 512M
          
    restart: unless-stopped
    networks:
      - compliance-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ..
      dockerfile: docker/frontend.Dockerfile
    container_name: compliance-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
      - NODE_ENV=production
      
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '0.4'
          memory: 384M
        reservations:
          cpus: '0.2'
          memory: 256M
          
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - compliance-network

  # Optional: Nginx reverse proxy
  # Uncomment jika butuh SSL atau domain
  # nginx:
  #   image: nginx:alpine
  #   container_name: compliance-nginx
  #   ports:
  #     - "80:80"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/nginx.conf:ro
  #   depends_on:
  #     - frontend
  #     - backend
  #   restart: unless-stopped
  #   networks:
  #     - compliance-network

networks:
  compliance-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

# Tidak ada volumes section - kita menggunakan bind mount ke ../data
# Data sudah ditransfer via SCP sebelum deployment