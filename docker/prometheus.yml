global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'backend'
    static_configs:
      - targets: ['backend:8000']
    metrics_path: '/metrics'

  - job_name: 'celery_worker'
    static_configs:
      - targets: ['celery_worker:8000']

  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']