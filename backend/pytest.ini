[pytest]
testpaths = tests
asyncio_mode = auto
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Show short test summary for failures and errors
addopts =
    -v
    --tb=short
    --strict-markers
    -q

markers =
    slow: marks tests as slow (deselect with -m "not slow")
    integration: marks tests that require live services
